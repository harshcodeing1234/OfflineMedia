<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>OfflineMedia – Play</title>
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='g' x1='0%' y1='0%' x2='100%' y2='100%'><stop offset='0%' style='stop-color:%23667eea'/><stop offset='100%' style='stop-color:%23764ba2'/></linearGradient></defs><rect width='100' height='100' rx='16' fill='url(%23g)'/><path d='M35 25 L75 50 L35 75 Z' fill='%23fff'/></svg>">
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #000;
      --surface: #111;
      --card: #1a1a1a;
      --border: rgba(255, 255, 255, 0.1);
      --accent: #7c3aed;
      --accent2: #06b6d4;
      --text: #fff;
      --muted: #888;
      --nav-w: 240px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: var(--nav-w);
      background: #0d0d0d;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0;
      left: 0;
      height: 100vh;
      z-index: 101;
      transition: transform .3s;
    }

    .logo-area {
      padding: 20px 20px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .logo-mark {
      display: flex;
      align-items: center;
      gap: 10px;
      max-width: 100%;
      overflow: hidden;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      position: relative;
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
    }

    .logo-icon::before {
      content: '';
      position: absolute;
      width: 0;
      height: 0;
      border-left: 10px solid #fff;
      border-top: 6px solid transparent;
      border-bottom: 6px solid transparent;
      margin-left: 2px;
    }

    .logo-text {
      font-family: inherit;
      font-size: 18px;
      font-weight: 800;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .logo-text span {
      color: var(--accent2);
    }

    .nav-links {
      flex: 1;
      padding: 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      overflow-y: auto;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 12px;
      color: var(--muted);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all .25s;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
    }

    .nav-item:hover {
      background: #1e1e1e;
      color: var(--text);
    }

    .nav-item.active {
      background: linear-gradient(135deg, rgba(124, 58, 237, 0.25), rgba(6, 182, 212, 0.1));
      color: var(--text);
      border: 1px solid rgba(124, 58, 237, 0.3);
    }

    .nav-icon {
      font-size: 18px;
      width: 22px;
      text-align: center;
    }

    .profile-area {
      padding: 16px 12px;
      border-top: 1px solid var(--border);
      position: relative;
    }

    .profile-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 12px;
      background: #1a1a1a;
      border: 1px solid var(--border);
      cursor: pointer;
      width: 100%;
      transition: all .25s;
    }

    .avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
    }

    .profile-name {
      font-size: 13px;
      font-weight: 600;
      flex: 1;
      text-align: left;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .profile-dropdown {
      position: absolute;
      bottom: 80px;
      left: 12px;
      right: 12px;
      background: #1e1e1e;
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      display: none;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.8);
    }

    .profile-dropdown.open {
      display: block;
    }

    .dd-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 13px 16px;
      font-size: 14px;
      cursor: pointer;
      transition: background .2s;
    }

    .dd-item:hover {
      background: #252525;
    }

    .dd-item.danger {
      color: #f87171;
    }

    .dd-divider {
      height: 1px;
      background: var(--border);
    }

    /* ── VIDEO FEED ── */
    .feed-wrap {
      margin-left: var(--nav-w);
      flex: 1;
      height: 100vh;
      overflow: hidden;
      background: var(--bg);
      position: relative;
      touch-action: pan-y;
    }

    .reels-header {
      position: absolute;
      top: 20px;
      left: 20px;
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      z-index: 100;
      /* text-shadow: 0 2px 8px rgba(0, 0, 0, 0.3); */
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 8px;
      /* background: rgba(0, 0, 0, 0.5); */
      /* backdrop-filter: blur(10px); */
      transition: all 0.3s;
    }

    .reels-header:hover {
      background: rgba(0, 0, 0, 0.7);
    }

    .dropdown-arrow {
      font-size: 12px;
      transition: transform 0.3s;
    }

    .reels-header.open .dropdown-arrow {
      transform: rotate(180deg);
    }

    .filter-dropdown {
      position: absolute;
      top: 65px;
      left: 20px;
      /* background: rgba(0, 0, 0, 0.9); */
      backdrop-filter: blur(20px);
      /* border: 1px solid rgba(255, 255, 255, 0.1); */
      border-radius: 12px;
      z-index: 99;
      display: none;
      flex-direction: column;
      min-width: 180px;
      /* box-shadow: 0 8px 32px rgba(0, 0, 0, 0.8); */
      overflow: hidden;
    }

    .filter-dropdown.open {
      display: flex;
    }

    .filter-option {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      cursor: pointer;
      transition: all 0.2s;
      color: #fff;
    }

    .filter-option:hover {
      background: rgba(124, 58, 237, 0.3);
    }

    .filter-option .filter-icon {
      width: 22px;
      height: 22px;
      color: #fff;
      flex-shrink: 0;
    }

    .filter-option span {
      font-size: 14px;
      font-weight: 500;
    }

    .feed-container {
      height: 100vh;
      position: relative;
      transition: transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      will-change: transform;
    }

    .video-slide {
      height: 100vh;
      width: 100%;
      position: absolute;
      top: 0;
      left: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      overflow: hidden;
    }

    /* Fake video (gradient bg simulating cached video) */
    .video-bg {
      position: absolute;
      inset: 0;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .video-placeholder {
      font-size: 80px;
      opacity: 0.15;
      pointer-events: none;
      user-select: none;
    }

    .video-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }

    /* Bottom info */
    .video-info {
      padding: 16px 70px 30px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .video-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
    }

    .video-details {
      flex: 1;
    }

    .video-user {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .video-title {
      font-size: 13px;
      opacity: 0.85;
      margin-bottom: 6px;
      line-height: 1.4;
    }

    .video-stats {
      display: flex;
      gap: 14px;
      font-size: 12px;
      opacity: 0.7;
    }

    /* Right action bar */
    .action-bar {
      position: absolute;
      right: 12px;
      bottom: 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
    }

    .action-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .action-icon {
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      transition: all .2s;
      filter: drop-shadow(0 2px 8px rgba(0, 0, 0, 0.8));
    }

    .action-icon svg {
      width: 28px;
      height: 28px;
      fill: none;
      stroke: white;
      stroke-width: 1.5;
    }

    .action-icon:active {
      transform: scale(0.88);
    }

    .action-label {
      font-size: 11px;
      font-weight: 600;
      text-shadow: 0 1px 4px rgba(0, 0, 0, 0.9);
    }

    .action-btn.liked .action-icon svg {
      fill: #ef4444;
      stroke: #ef4444;
    }

    .action-btn.saved .action-icon svg {
      fill: #10b981;
      stroke: #10b981;
    }

    /* Play/Pause center */
    .play-pause {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 56px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .3s;
      text-shadow: 0 4px 16px rgba(0, 0, 0, 0.9);
    }

    .play-pause.show {
      opacity: 1;
    }

    /* Double tap heart */
    .dbl-heart {
      position: absolute;
      font-size: 80px;
      pointer-events: none;
      opacity: 0;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      transition: all .6s cubic-bezier(.34, 1.56, .64, 1);
      z-index: 10;
    }

    .dbl-heart.pop {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1.2);
    }

    .dbl-heart.fade {
      opacity: 0;
      transform: translate(-50%, -50%) scale(1.6);
    }

    /* Progress bar */
    .progress-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: rgba(255, 255, 255, 0.1);
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      width: 0%;
      transition: width .5s linear;
    }

    /* Header bar */
    .feed-header {
      position: fixed;
      top: 0;
      right: 0;
      left: var(--nav-w);
      height: 52px;
      background: linear-gradient(to bottom, rgba(0, 0, 0, 0.9), rgba(0, 0, 0, 0.7));
      backdrop-filter: blur(10px);
      z-index: 50;
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 12px;
    }

    .menu-btn-feed {
      display: none;
      background: none;
      border: none;
      color: #fff;
      font-size: 22px;
      cursor: pointer;
    }

    .feed-title {
      font-family: inherit;
      font-size: 16px;
      font-weight: 700;
      flex: 1;
    }

    .feed-header .avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
    }

    .loop-badge {
      margin-left: auto;
      font-size: 11px;
      background: rgba(124, 58, 237, 0.4);
      border: 1px solid rgba(124, 58, 237, 0.6);
      border-radius: 20px;
      padding: 4px 10px;
    }

    /* Comment panel */
    .comment-panel {
      position: fixed;
      bottom: 0;
      left: var(--nav-w);
      right: 0;
      background: #111;
      border-top: 1px solid var(--border);
      border-radius: 24px 24px 0 0;
      z-index: 200;
      transform: translateY(100%);
      transition: transform .4s cubic-bezier(.34, 1.2, .64, 1);
      max-height: 70vh;
      display: flex;
      flex-direction: column;
    }

    .comment-panel.open {
      transform: translateY(0);
    }

    .cp-handle {
      width: 40px;
      height: 4px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 2px;
      margin: 12px auto 0;
    }

    .cp-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
    }

    .cp-title {
      font-family: inherit;
      font-size: 15px;
      font-weight: 700;
    }

    .cp-close {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 22px;
      cursor: pointer;
    }

    .comments-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .comment-item {
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }

    .c-av {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .c-body {
      flex: 1;
    }

    .c-name {
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 3px;
    }

    .c-text {
      font-size: 13px;
      opacity: 0.85;
      line-height: 1.4;
    }

    .c-actions {
      display: flex;
      gap: 12px;
      margin-top: 6px;
    }

    .c-act {
      font-size: 11px;
      color: var(--muted);
      cursor: pointer;
      background: none;
      border: none;
      color: var(--muted);
    }

    .c-act:hover {
      color: var(--text);
    }

    .c-act.del {
      color: #f87171;
    }

    .comment-input-row {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .comment-input {
      flex: 1;
      background: #1a1a1a;
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 10px 16px;
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      outline: none;
    }

    .comment-input:focus {
      border-color: var(--accent);
    }

    .send-btn {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Share panel */
    .share-panel {
      position: fixed;
      bottom: 0;
      left: var(--nav-w);
      right: 0;
      background: #111;
      border-top: 1px solid var(--border);
      border-radius: 24px 24px 0 0;
      z-index: 201;
      transform: translateY(100%);
      transition: transform .4s cubic-bezier(.34, 1.2, .64, 1);
      padding-bottom: env(safe-area-inset-bottom);
    }

    .share-panel.open {
      transform: translateY(0);
    }

    .share-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      padding: 24px 20px;
    }

    .share-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }

    .share-icon-wrap {
      width: 54px;
      height: 54px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      transition: transform .2s;
    }

    .share-item:active .share-icon-wrap {
      transform: scale(0.9);
    }

    .share-label {
      font-size: 11px;
      color: var(--muted);
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: #1a1a1a;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 18px;
      font-size: 13px;
      z-index: 500;
      opacity: 0;
      transition: opacity .3s;
      pointer-events: none;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
    }

    .sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      z-index: 100;
    }

    /* Loading Spinner */
    .loading-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(4px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      pointer-events: none;
    }

    .loading-overlay.show {
      display: flex;
      pointer-events: all;
    }

    .loading-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .spinner-wrapper {
      position: relative;
      width: 50px;
      height: 50px;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 3px solid rgba(124, 58, 237, 0.2);
      border-top-color: #7c3aed;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      position: absolute;
    }

    .spinner-logo {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 24px;
      height: 24px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .spinner-logo::before {
      content: '';
      width: 0;
      height: 0;
      border-left: 8px solid #fff;
      border-top: 5px solid transparent;
      border-bottom: 5px solid transparent;
      margin-left: 1px;
    }

    .loading-text {
      font-family: inherit;
      font-size: 14px;
      font-weight: 700;
      color: #fff;
    }

    .loading-text span {
      color: #06b6d4;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media(max-width:768px) {
      .sidebar {
        transform: translateX(-100%);
      }

      .sidebar.open {
        transform: translateX(0);
      }

      .sidebar-overlay.show {
        display: block;
      }

      .feed-wrap {
        margin-left: 0;
      }

      .reels-header {
        top: 15px;
        left: 15px;
      }

      .filter-dropdown {
        top: 55px;
        left: 15px;
      }

      .feed-header {
        display: none;
      }

      .comment-panel,
      .share-panel {
        left: 0;
        max-height: 60vh;
        bottom: 70px;
        transform: translateY(calc(100% + 70px));
      }

      .comment-panel.open,
      .share-panel.open {
        transform: translateY(0);
      }

      .menu-btn-feed {
        display: none;
      }

      /* Mobile: Full screen video */
      .video-slide video {
        width: 100vw !important;
        height: 100vh !important;
        object-fit: cover !important;
      }

      .video-overlay {
        background: linear-gradient(to top, rgba(0, 0, 0, 0.8) 0%, transparent 40%, rgba(0, 0, 0, 0.3) 100%);
      }

      .video-info {
        z-index: 10;
        padding: 12px 60px 140px 12px;
      }

      .action-bar {
        z-index: 10;
        right: 8px;
        bottom: 140px;
      }

      .play-pause {
        z-index: 10;
      }
    }

    /* ── MOBILE BOTTOM NAV ── */
    .bottom-nav {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 8px 0 max(8px, env(safe-area-inset-bottom));
      height: calc(65px + env(safe-area-inset-bottom));
      z-index: 1000;
    }

    .bottom-nav-items {
      display: flex;
      justify-content: space-around;
      align-items: center;
      max-width: 600px;
      margin: 0 auto;
    }

    .bottom-nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 6px 12px;
      text-decoration: none;
      color: var(--muted);
      font-size: 11px;
      font-weight: 500;
      transition: color .2s;
      flex: 1;
      max-width: 80px;
      background: none;
      border: none;
      cursor: pointer;
    }

    .bottom-nav-item svg {
      width: 24px;
      height: 24px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .bottom-nav-item.active {
      color: #00ffcc;
    }

    .bottom-nav-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
      color: #fff;
    }

    .mobile-profile-menu {
      display: none;
      position: fixed;
      bottom: 70px;
      right: 10px;
      background: #1e1e2a;
      backdrop-filter: blur(10px);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
      min-width: 160px;
      z-index: 1001;
    }

    .mobile-profile-menu.open {
      display: block;
    }

    .mobile-menu-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      font-size: 14px;
      cursor: pointer;
      transition: background .2s;
      color: var(--text);
      text-decoration: none;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
    }

    .mobile-menu-item:hover {
      background: var(--surface);
    }

    .mobile-menu-item.danger {
      color: #f87171;
    }

    .mobile-menu-divider {
      height: 1px;
      background: var(--border);
    }

    @media (max-width: 768px) {
      .sidebar {
        transform: translateX(-100%);
      }

      .main {
        margin-left: 0;
      }

      .bottom-nav {
        display: block;
      }

      .video-container {
        height: calc(100dvh - 65px - env(safe-area-inset-bottom));
        margin-bottom: calc(65px + env(safe-area-inset-bottom));
      }

      .video-item {
        margin-bottom: calc(65px + env(safe-area-inset-bottom));
      }
    }

    /* Modal */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(6px);
      z-index: 300;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .overlay.open {
      display: flex;
    }

    .modal {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 32px;
      width: 100%;
      max-width: 440px;
      animation: modalIn .3s cubic-bezier(.34, 1.56, .64, 1);
    }

    @keyframes modalIn {
      from {
        opacity: 0;
        transform: scale(0.85) translateY(20px);
      }
      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    .modal-title {
      font-size: 20px;
      font-weight: 800;
      margin-bottom: 24px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: .5px;
    }

    input, select {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 13px 16px;
      color: var(--text);
      font-size: 15px;
      outline: none;
      transition: border-color .3s;
    }

    input:focus, select:focus {
      border-color: var(--accent);
    }

    .modal-actions {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }

    .btn-cancel {
      flex: 1;
      padding: 13px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-submit {
      flex: 2;
      padding: 13px;
      background: linear-gradient(135deg, var(--accent), #9333ea);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all .3s;
    }

    .btn-submit:hover {
      box-shadow: 0 6px 20px rgba(124, 58, 237, 0.4);
    }
  </style>
</head>

<body>

  <!-- <div class="feed-header">
    <button class="menu-btn-feed" onclick="openSidebar()">☰</button>

  <div class="feed-wrap" id="feedWrap">

    <div class="filter-dropdown" id="filterDropdown">

        </svg>
        <span>Facebook</span>
      </div>

    <div class="feed-container" id="feedContainer"></div>
    <div id="emptyState" style="display:none;height:100vh;align-items:center;justify-content:center;flex-direction:column;gap:16px;color:#888">

    </div>

  <!-- Comment Panel -->
  <div class="comment-panel" id="commentPanel">
    <div class="cp-handle"></div>
    <div class="cp-header">
      <span class="cp-title">Comments</span>
      <button class="cp-close" onclick="closeComments()">✕</button>
    </div>
    <div class="comments-list" id="commentsList"></div>
    <div class="comment-input-row">
      <input class="comment-input" id="commentInput" placeholder="Add a comment…"
        onkeydown="if(event.key==='Enter')postComment()">
      <button class="send-btn" onclick="postComment()">➤</button>

  <div class="toast" id="toast"></div>

  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-content">
      <div class="spinner-wrapper">
        <div class="spinner"></div>
        <div class="spinner-logo"></div>
      </div>
      <div class="loading-text">Offline<span>Media</span></div>
    </div>
  </div>

  <script>
    // ── Session guard ──
    let userData = null;

    async function loadUser() {
      try {
        const res = await fetch('/api/user');
        if (!res.ok) {
          window.location.href = '/auth';
          return;
        }
        userData = await res.json();
        updateUserUI();
      } catch (e) {
        window.location.href = '/auth';
      }
    }

    function updateUserUI() {
      // No UI update needed since profile is removed from play page
    }

    // ── Load videos ──
    let videos = [];
    let allVideos = [];
    let currentFilter = 'mix';

    let offset = 0;
    const limit = 30;
    let hasMore = true;
    let loading = false;

    async function loadVideos() {
      if (loading || !hasMore) return;
      loading = true;
      showLoading();
      try {
        const res = await fetch(`/api/videos?limit=${limit}&offset=${offset}`);
        const newVideos = await res.json();
        
        if (!newVideos.length) {
          hasMore = false;
          if (!allVideos.length) {
            hideLoading();
            document.getElementById('feedWrap').innerHTML = '<div style="height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;color:#666"><div style="font-size:60px">📭</div><div style="font-family:Syne,sans-serif;font-size:18px">No videos yet</div><a href="/scrapp" style="color:#7c3aed;font-size:14px">Create a Scrapp →</a></div>';
          }
          loading = false;
          return;
        }
        
        allVideos = [...allVideos, ...newVideos];
        offset += newVideos.length;
        hasMore = newVideos.length === limit;
        
        videos = [...allVideos];
        buildAllVideos();
        
        if (offset === newVideos.length) {
          filterPlatform('mix');
        }
        
        hideLoading();
        loading = false;
      } catch (e) {
        console.error('Failed to load videos:', e);
        hideLoading();
        loading = false;
      }
    }

    function filterPlatform(platform) {
      // Pause and mute current video before filtering
      const currentVid = document.getElementById('vid-' + activeVideoIdx);
      if (currentVid) {
        currentVid.pause();
        currentVid.muted = true;
      }
      playing[activeVideoIdx] = false;
      
      currentFilter = platform;
      
      // Close dropdown
      document.getElementById('filterDropdown').classList.remove('open');
      document.querySelector('.reels-header').classList.remove('open');
      
      // Update title
      const titles = {
        'mix': 'Reels',
        'instagram': 'Instagram',
        'youtube': 'YouTube',
        'facebook': 'Facebook'
      };
      document.getElementById('reelsTitle').textContent = titles[platform];

      // Show/hide videos based on platform (no rebuild)
      let visibleCount = 0;
      let firstVisibleIdx = -1;
      
      videos.forEach((v, i) => {
        const slide = document.getElementById('slide-' + i);
        if (slide) {
          const shouldShow = platform === 'mix' || v.platform.toLowerCase() === platform;
          if (shouldShow) {
            slide.style.display = 'flex';
            slide.style.transform = `translateY(${visibleCount * 100}vh)`;
            if (firstVisibleIdx === -1) firstVisibleIdx = i;
            visibleCount++;
          } else {
            slide.style.display = 'none';
          }
        }
      });
      
      if (visibleCount === 0) {
        const platformName = titles[platform];
        document.getElementById('feedContainer').style.display = 'none';
        document.getElementById('emptyState').style.display = 'flex';
        document.getElementById('emptyStateText').textContent = 'No videos from ' + platformName;
        return;
      }

      document.getElementById('feedContainer').style.display = 'block';
      document.getElementById('emptyState').style.display = 'none';

      activeVideoIdx = firstVisibleIdx;
      const container = document.getElementById('feedContainer');
      container.style.transform = `translateY(0vh)`;
      
      startVideo(firstVisibleIdx);
    }

    function toggleFilterDropdown() {
      const dropdown = document.getElementById('filterDropdown');
      const header = document.querySelector('.reels-header');
      dropdown.classList.toggle('open');
      header.classList.toggle('open');
    }

    // Close dropdown when clicking outside
    document.addEventListener('click', (e) => {
      const dropdown = document.getElementById('filterDropdown');
      const header = document.querySelector('.reels-header');
      if (dropdown && header && !header.contains(e.target) && !dropdown.contains(e.target)) {
        dropdown.classList.remove('open');
        header.classList.remove('open');
      }
    });

    let activeVideoIdx = 0;
    let commentVideoIdx = 0;
    let editCommentId = null;
    const progressTimers = {};
    const emojiBg = ['🌄', '🏙', '🍳', '✈', '💻', '🎵', '💪', '😂', '🎥', '🎬', '🌅', '🎨', '☕', '🏔', '🌊', '🎭', '🚀', '🦋'];
    let isTransitioning = false;

    // ── Build all videos once ──
    function buildAllVideos() {
      const container = document.getElementById('feedContainer');
      container.innerHTML = '';

      videos.forEach((v, i) => {
        const slide = document.createElement('div');
        slide.className = 'video-slide';
        slide.id = 'slide-' + i;
        slide.setAttribute('data-platform', v.platform.toLowerCase());
        slide.style.transform = `translateY(${i * 100}vh)`;
        const emoji = emojiBg[i % emojiBg.length];

        slide.innerHTML = `
      <div class="video-bg">
        ${v.filename ? `<video id="vid-${i}" style="width:100%;height:100%;object-fit:contain" src="/cache/${v.filename}" loop preload="auto" playsinline webkit-playsinline x-webkit-airplay="allow" muted></video>` : `<div class="video-placeholder">${emoji}</div>`}
      </div>
      <div class="progress-bar"><div class="progress-fill" id="prog-${i}"></div></div>
      <div class="video-overlay">
        <div class="video-info">
          <div class="video-avatar" id="videoAvatar-${i}"></div>
          <div class="video-details">
            <div class="video-user">${userData.username}</div>
            <div class="video-title">${v.platform}</div>
          </div>
        </div>
      </div>
      <div class="action-bar">
        <div class="action-btn ${v.liked ? 'liked' : ''}" id="likeBtn-${i}" data-action="like" data-index="${i}">
          <div class="action-icon">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <span class="action-label" id="likeCnt-${i}" style="display: ${v.likes > 0 ? 'block' : 'none'}">${v.likes}</span>
        </div>
        <div class="action-btn" id="commentBtn-${i}" data-action="comment" data-index="${i}">
          <div class="action-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>

          </div>
          <span class="action-label" id="comCnt-${i}" style="display: ${v.comment_count > 0 ? 'block' : 'none'}">${v.comment_count}</span>
        </div>
        <div class="action-btn" id="shareBtn-${i}" data-action="share" data-index="${i}">
          <div class="action-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13"/><path d="M22 2L15 22L11 13L2 9L22 2Z"/></svg>
          </div>
          <span class="action-label">Share</span>
        </div>
        <div class="action-btn" id="loopBtn-${i}" data-action="loop" data-index="${i}">
          <div class="action-icon" id="loopIcon-${i}">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M17 1l4 4-4 4M3 11V9a4 4 0 0 1 4-4h14M7 23l-4-4 4-4M21 13v2a4 4 0 0 1-4 4H3" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <span class="action-label">Loop</span>
        </div>
        <div class="action-btn" id="saveBtn-${i}" data-action="save" data-index="${i}">
          <div class="action-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3h12a1 1 0 0 1 1 1v17l-7-5-7 5V4a1 1 0 0 1 1-1z"/></svg>
          </div>
          <span class="action-label">Save</span>
        </div>
      </div>
      <div class="play-pause" id="pp-${i}">⏸</div>
      <div class="dbl-heart" id="dblH-${i}">❤️</div>`;

        // Action button handlers
        slide.querySelectorAll('[data-action]').forEach(btn => {
          btn.addEventListener('click', (e) => {
            e.stopPropagation();
            e.preventDefault();
            const action = btn.dataset.action;
            const idx = parseInt(btn.dataset.index);

            if (action === 'like') toggleLike(idx);
            else if (action === 'comment') openComments(idx);
            else if (action === 'share') openShare(idx);
            else if (action === 'loop') toggleLoop(idx);
            else if (action === 'save') saveVideo(idx);
          });
        });

        // Long press for 2x speed & Double tap to like
        let tapTimer = null;
        let lastTap = 0;
        let longPressTimer = null;
        
        slide.addEventListener('mousedown', e => {
          if (e.target.closest('.action-bar')) return;
          longPressTimer = setTimeout(() => {
            const vid = document.getElementById('vid-' + i);
            if (vid) vid.playbackRate = 2.0;
          }, 500);
        });
        
        slide.addEventListener('mouseup', e => {
          if (longPressTimer) clearTimeout(longPressTimer);
          const vid = document.getElementById('vid-' + i);
          if (vid && vid.playbackRate === 2.0) vid.playbackRate = 1.0;
        });
        
        slide.addEventListener('touchstart', e => {
          if (e.target.closest('.action-bar')) return;
          longPressTimer = setTimeout(() => {
            const vid = document.getElementById('vid-' + i);
            if (vid) vid.playbackRate = 2.0;
          }, 500);
        }, { passive: true });
        
        slide.addEventListener('touchend', e => {
          if (longPressTimer) clearTimeout(longPressTimer);
          const vid = document.getElementById('vid-' + i);
          if (vid && vid.playbackRate === 2.0) vid.playbackRate = 1.0;
        }, { passive: true });
        
        slide.addEventListener('click', e => {
          if (e.target.closest('.action-bar')) return;

          const now = Date.now();
          if (now - lastTap < 300) {
            clearTimeout(tapTimer);
            e.preventDefault();
            doubleTapLike(i);
            lastTap = 0;
          } else {
            tapTimer = setTimeout(() => togglePlayPause(i), 300);
          }
          lastTap = now;
        });

        // Set avatar
        const avatarEl = slide.querySelector(`#videoAvatar-${i}`);
        if (avatarEl) {
          if (userData.avatar) {
            avatarEl.innerHTML = `<img src="${userData.avatar}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;
          } else {
            const initials = (userData.name || userData.username).split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
            avatarEl.textContent = initials;
          }
        }

        container.appendChild(slide);
      });
    }

    // ── Build feed ──
    function buildFeed() {
      const container = document.getElementById('feedContainer');
      container.innerHTML = '';

      videos.forEach((v, i) => {
        const slide = document.createElement('div');
        slide.className = 'video-slide';
        slide.id = 'slide-' + i;
        slide.style.transform = `translateY(${i * 100}vh)`;
        const emoji = emojiBg[i % emojiBg.length];

        slide.innerHTML = `
      <div class="video-bg">
        ${v.filename ? `<video id="vid-${i}" style="width:100%;height:100%;object-fit:contain" src="/cache/${v.filename}" loop preload="auto" playsinline webkit-playsinline muted></video>` : `<div class="video-placeholder">${emoji}</div>`}
      </div>
      <div class="progress-bar"><div class="progress-fill" id="prog-${i}"></div></div>
      <div class="video-overlay">
        <div class="video-info">
          <div class="video-avatar" id="videoAvatar-${i}"></div>
          <div class="video-details">
            <div class="video-user">${userData.username}</div>
            <div class="video-title">${v.platform} video</div>
          </div>
        </div>
      </div>
      <div class="action-bar">
        <div class="action-btn ${v.liked ? 'liked' : ''}" id="likeBtn-${i}" data-action="like" data-index="${i}">
          <div class="action-icon">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <span class="action-label" id="likeCnt-${i}" style="display: ${v.likes > 0 ? 'block' : 'none'}">${v.likes}</span>
        </div>
        <div class="action-btn" id="commentBtn-${i}" data-action="comment" data-index="${i}">
          <div class="action-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>
          </div>
          <span class="action-label" id="comCnt-${i}" style="display: ${v.comment_count > 0 ? 'block' : 'none'}">${v.comment_count}</span>
        </div>
        <div class="action-btn" id="shareBtn-${i}" data-action="share" data-index="${i}">
          <div class="action-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13"/><path d="M22 2L15 22L11 13L2 9L22 2Z"/></svg>
          </div>
          <span class="action-label">Share</span>
        </div>
        <div class="action-btn" id="loopBtn-${i}" data-action="loop" data-index="${i}">
          <div class="action-icon" id="loopIcon-${i}">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M17 1l4 4-4 4M3 11V9a4 4 0 0 1 4-4h14M7 23l-4-4 4-4M21 13v2a4 4 0 0 1-4 4H3" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <span class="action-label">Loop</span>
        </div>
        <div class="action-btn" id="saveBtn-${i}" data-action="save" data-index="${i}">
          <div class="action-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3h12a1 1 0 0 1 1 1v17l-7-5-7 5V4a1 1 0 0 1 1-1z"/></svg>
          </div>
          <span class="action-label">Save</span>
        </div>
      </div>
      <div class="play-pause" id="pp-${i}">⏸</div>
      <div class="dbl-heart" id="dblH-${i}">❤️</div>`;

        // Action button handlers
        slide.querySelectorAll('[data-action]').forEach(btn => {
          btn.addEventListener('click', (e) => {
            e.stopPropagation();
            e.preventDefault();
            const action = btn.dataset.action;
            const idx = parseInt(btn.dataset.index);

            if (action === 'like') toggleLike(idx);
            else if (action === 'comment') openComments(idx);
            else if (action === 'share') openShare(idx);
            else if (action === 'loop') toggleLoop(idx);
            else if (action === 'save') saveVideo(idx);
          });
        });

        // Double tap to like
        let tapTimer = null;
        let lastTap = 0;
        slide.addEventListener('click', e => {
          if (e.target.closest('.action-bar')) return;

          const now = Date.now();
          if (now - lastTap < 300) {
            clearTimeout(tapTimer);
            e.preventDefault();
            doubleTapLike(i);
            lastTap = 0;
          } else {
            tapTimer = setTimeout(() => togglePlayPause(i), 300);
          }
          lastTap = now;
        });

        // Set avatar
        const avatarEl = slide.querySelector(`#videoAvatar-${i}`);
        if (avatarEl) {
          if (userData.avatar) {
            avatarEl.innerHTML = `<img src="${userData.avatar}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;
          } else {
            const initials = (userData.name || userData.username).split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
            avatarEl.textContent = initials;
          }
        }

        container.appendChild(slide);
      });

      // Don't auto-start video here, wait for it to load
      updateVisibility();
      startVideo(0);
    }

    // ── Swipe Navigation ──
    function goToSlide(index) {
      if (isTransitioning) return;

      // Find visible slides
      const visibleSlides = [];
      allVideos.forEach((v, i) => {
        const slide = document.getElementById('slide-' + i);
        if (slide && slide.style.display !== 'none') {
          visibleSlides.push(i);
        }
      });

      const currentPos = visibleSlides.indexOf(activeVideoIdx);
      let targetPos = currentPos;
      
      if (index === activeVideoIdx + 1) targetPos = currentPos + 1;
      else if (index === activeVideoIdx - 1) targetPos = currentPos - 1;
      
      // Loop back to start if at end
      if (targetPos >= visibleSlides.length) {
        // Reached end - reshuffle and loop
        allVideos = allVideos.sort(() => Math.random() - 0.5);
        videos = [...allVideos];
        buildAllVideos();
        filterPlatform(currentFilter);
        targetPos = 0;
      } else if (targetPos < 0) {
        targetPos = visibleSlides.length - 1;
      }
      
      const targetIdx = visibleSlides[targetPos];
      if (targetIdx === activeVideoIdx) return;

      isTransitioning = true;
      pauseVideo(activeVideoIdx);

      activeVideoIdx = targetIdx;
      const container = document.getElementById('feedContainer');
      container.style.transform = `translateY(-${targetPos * 100}vh)`;

      setTimeout(() => {
        startVideo(targetIdx);
        isTransitioning = false;
      }, 350);
    }

    function updateVisibility() {
      // Load more videos when near end
      if (activeVideoIdx >= videos.length - 10 && hasMore && !loading) {
        loadVideos();
      }
      
      // Preload nearby videos aggressively
      for (let j = -1; j <= 3; j++) {
        const vid = document.getElementById('vid-' + (activeVideoIdx + j));
        if (vid && vid.readyState < 3) {
          vid.load();
        }
      }
    }

    // ── Touch Swipe ──
    let touchStartY = 0;
    let touchStartTime = 0;
    const feedWrap = document.getElementById('feedWrap');

    feedWrap.addEventListener('touchstart', (e) => {
      if (e.target.closest('.action-bar') || e.target.closest('.action-btn') ||
        e.target.closest('.action-icon') || e.target.closest('.comment-panel') ||
        e.target.closest('.share-panel')) return;
      touchStartY = e.touches[0].clientY;
      touchStartTime = Date.now();
    }, { passive: true });

    feedWrap.addEventListener('touchend', (e) => {
      if (isTransitioning || e.target.closest('.action-bar') || e.target.closest('.action-btn') ||
        e.target.closest('.action-icon') || e.target.closest('.comment-panel') ||
        e.target.closest('.share-panel')) return;

      const touchEndY = e.changedTouches[0].clientY;
      const distance = touchStartY - touchEndY;
      const time = Date.now() - touchStartTime;
      const velocity = Math.abs(distance) / time;

      // Swipe threshold: 80px or velocity > 0.6
      if (Math.abs(distance) > 80 || (velocity > 0.6 && Math.abs(distance) > 30)) {
        if (distance > 0) {
          goToSlide(activeVideoIdx + 1);
        } else {
          goToSlide(activeVideoIdx - 1);
        }
      }
    }, { passive: true });

    // ── Autoplay management ──
    let playing = {};
    let watchTimers = {};

    function startVideo(i, resetTime = true) {
      playing[i] = true;
      const vid = document.getElementById('vid-' + i);
      if (vid) {
        if (resetTime) vid.currentTime = 0;
        
        // Aggressive preload
        if (vid.readyState < 3) {
          vid.load();
        }
        
        const playWhenReady = () => {
          vid.muted = false;
          vid.play().then(() => {
            hideLoading();
            startWatchTimer(i);
          }).catch(() => {
            hideLoading();
          });
        };

        if (vid.readyState >= 2) {
          playWhenReady();
        } else {
          vid.addEventListener('loadeddata', playWhenReady, { once: true });
          setTimeout(() => {
            if (vid.readyState < 2) {
              hideLoading();
            }
          }, 3000);
        }

        // Preload next 3 videos
        for (let j = 1; j <= 3; j++) {
          const nextVid = document.getElementById('vid-' + (i + j));
          if (nextVid && nextVid.readyState < 3) {
            nextVid.load();
          }
        }
      } else {
        hideLoading();
      }
      startProgress(i);
    }

    function startWatchTimer(i) {
      clearWatchTimer(i);
      watchTimers[i] = setTimeout(() => {
        saveToHistory(i);
      }, 5000);
    }

    function clearWatchTimer(i) {
      if (watchTimers[i]) {
        clearTimeout(watchTimers[i]);
        delete watchTimers[i];
      }
    }

    async function saveToHistory(i) {
      const v = allVideos[i];
      if (!v || !v.filename) return;
      try {
        await fetch(`/api/video/${encodeURIComponent(v.filename)}/watch`, { method: 'POST' });
        console.log('Video saved to history:', v.filename);
      } catch (e) {
        console.error('Failed to save to history:', e);
      }
    }

    function pauseVideo(i) {
      playing[i] = false;
      clearWatchTimer(i);
      const vid = document.getElementById('vid-' + i);
      if (vid) {
        vid.pause();
        vid.muted = true;
      }
      clearProgress(i);
    }
    function togglePlayPause(i) {
      if (playing[i]) {
        pauseVideo(i);
        showPP(i, '▶', true);
      } else {
        startVideo(i, false);
        showPP(i, '⏸', true);
      }
    }
    function showPP(i, icon, show) {
      const el = document.getElementById('pp-' + i);
      if (!el) return;
      el.textContent = icon;
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 600);
    }

    // ── Progress simulation ──
    function startProgress(i) {
      clearProgress(i);
      let p = 0;
      const el = document.getElementById('prog-' + i);
      progressTimers[i] = setInterval(() => {
        p += 0.5;
        if (el) el.style.width = Math.min(p, 100) + '%';
        if (p >= 100) { clearProgress(i); if (loopSet[i] !== false) startProgress(i); }
      }, 150);
    }
    function clearProgress(i) { clearInterval(progressTimers[i]); }
    const loopSet = {};
    function toggleLoop(i) {
      loopSet[i] = loopSet[i] === false ? true : false;
      const el = document.getElementById('loopIcon-' + i);
      if (el) {
        el.innerHTML = loopSet[i] === false
          ? '<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M17 1l4 4-4 4M3 11V9a4 4 0 0 1 4-4h14M7 23l-4-4 4-4M21 13v2a4 4 0 0 1-4 4H3" stroke-linecap="round" stroke-linejoin="round"/><circle cx="12" cy="12" r="2" fill="white"/></svg>'
          : '<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M17 1l4 4-4 4M3 11V9a4 4 0 0 1 4-4h14M7 23l-4-4 4-4M21 13v2a4 4 0 0 1-4 4H3" stroke-linecap="round" stroke-linejoin="round"/></svg>';
      }
      showToast(loopSet[i] === false ? 'Loop off' : 'Loop on');
    }

    // ── Double tap like ──
    function doubleTapLike(i) {
      if (!videos[i].liked) {
        toggleLike(i);
      }
      const h = document.getElementById('dblH-' + i);
      h.className = 'dbl-heart pop';
      setTimeout(() => { h.className = 'dbl-heart fade'; }, 600);
      setTimeout(() => { h.className = 'dbl-heart'; }, 1200);
    }

    async function toggleLike(i) {
      try {
        const v = allVideos[i];
        console.log('Liking video:', v.filename);
        const res = await fetch(`/api/video/${encodeURIComponent(v.filename)}/like`, { method: 'POST' });
        if (!res.ok) {
          console.error('Like failed:', res.status);
          return;
        }
        const data = await res.json();
        console.log('Like response:', data);
        
        // Update all instances of this video in allVideos array
        allVideos.forEach(video => {
          if (video.filename === v.filename) {
            video.likes = data.likes;
            video.liked = data.liked;
          }
        });
        
        // Update cache
        sessionStorage.setItem('playVideos', JSON.stringify(allVideos));
        
        updateLikeUI(i);
      } catch (e) {
        console.error('Failed to like:', e);
      }
    }

    function updateLikeUI(i) {
      const btn = document.getElementById('likeBtn-' + i);
      const cnt = document.getElementById('likeCnt-' + i);
      const slide = document.getElementById('slide-' + i);

      if (btn) btn.className = 'action-btn' + (allVideos[i].liked ? ' liked' : '');
      if (cnt) {
        cnt.textContent = allVideos[i].likes;
        cnt.style.display = allVideos[i].likes > 0 ? 'block' : 'none';
      }

      // Update video-stats section
      const statsSpan = slide?.querySelector('.video-stats span:last-child');
      if (statsSpan) statsSpan.textContent = `❤ ${allVideos[i].likes}`;
    }

    // ── Save Video ──
    async function saveVideo(i) {
      const v = allVideos[i];
      if (!v.filename) {
        showToast('Video not available');
        return;
      }
      try {
        const res = await fetch(`/api/video/${encodeURIComponent(v.filename)}/save`, { method: 'POST' });
        const data = await res.json();
        if (data.saved) {
          showToast('Video saved permanently!');
          const btn = document.getElementById('saveBtn-' + i);
          if (btn) btn.classList.add('saved');
        } else {
          showToast('Video unsaved');
          const btn = document.getElementById('saveBtn-' + i);
          if (btn) btn.classList.remove('saved');
        }
      } catch (e) {
        showToast('Failed to save video');
      }
    }

    // ── Comments ──
    async function openComments(i) {
      commentVideoIdx = i;
      editCommentId = null;
      await loadComments(i);
      document.getElementById('commentPanel').classList.add('open');
    }
    function closeComments() { document.getElementById('commentPanel').classList.remove('open'); editCommentId = null; }

    async function loadComments(i) {
      try {
        const v = allVideos[i];
        const res = await fetch(`/api/video/${encodeURIComponent(v.filename)}/comments`);
        const comments = await res.json();
        renderComments(comments);
      } catch (e) {
        console.error('Failed to load comments:', e);
      }
    }

    function renderComments(comments) {
      const list = document.getElementById('commentsList');
      if (!comments.length) {
        list.innerHTML = '<div style="text-align:center;padding:30px;color:#555;font-size:14px">No comments yet. Be the first! 💬</div>';
        return;
      }
      list.innerHTML = comments.map((c, ci) => {
        let avatarHtml = '';
        if (c.avatar) {
          avatarHtml = `<img src="${c.avatar}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;
        } else {
          const initials = c.username.slice(0, 2).toUpperCase();
          avatarHtml = initials;
        }

        return `
    <div class="comment-item">
      <div class="c-av">${avatarHtml}</div>
      <div class="c-body">
        <div class="c-name">${c.username}</div>
        <div class="c-text" id="ctext-${c.id}">${c.text}</div>
      </div>
      ${c.username === userData.username ? `
      <div style="display:flex;gap:8px;margin-left:auto">
        <button class="c-act" onclick="editComment(${c.id}, '${c.text.replace(/'/g, "\\'")}')">✎</button>
        <button class="c-act del" onclick="deleteComment(${c.id})">✕</button>
      </div>` : ''}
    </div>`;
      }).join('');
    }

    async function editComment(commentId, currentText) {
      const inp = document.getElementById('commentInput');
      inp.value = currentText;
      inp.focus();
      editCommentId = commentId;
    }

    async function deleteComment(commentId) {
      if (!confirm('Delete this comment?')) return;

      try {
        await fetch(`/api/comment/${commentId}`, { method: 'DELETE' });
        await loadComments(commentVideoIdx);
        allVideos[commentVideoIdx].comment_count--;
        const comCnt = document.getElementById('comCnt-' + commentVideoIdx);
        if (comCnt) {
          comCnt.textContent = allVideos[commentVideoIdx].comment_count;
          comCnt.style.display = allVideos[commentVideoIdx].comment_count > 0 ? 'block' : 'none';
        }
        showToast('Comment deleted');
      } catch (e) {
        showToast('Failed to delete comment');
      }
    }

    async function postComment() {
      const inp = document.getElementById('commentInput');
      const txt = inp.value.trim();
      if (!txt) return;

      try {
        const v = allVideos[commentVideoIdx];
        if (editCommentId) {
          await fetch(`/api/comment/${editCommentId}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ text: txt })
          });
          editCommentId = null;
          showToast('Comment updated');
        } else {
          const res = await fetch(`/api/video/${encodeURIComponent(v.filename)}/comment`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ text: txt })
          });
          const data = await res.json();
          allVideos[commentVideoIdx].comment_count = data.comment_count;
        }
        inp.value = '';
        await loadComments(commentVideoIdx);
        const comCnt = document.getElementById('comCnt-' + commentVideoIdx);
        if (comCnt) {
          comCnt.textContent = allVideos[commentVideoIdx].comment_count;
          comCnt.style.display = allVideos[commentVideoIdx].comment_count > 0 ? 'block' : 'none';
        }
      } catch (e) {
        console.error('Failed to post comment:', e);
      }
    }

    // ── Share ──
    async function openShare(i) {
      const v = allVideos[i];
      const videoUrl = `${window.location.origin}/cache/${v.filename}`;
      const shareData = {
        title: 'OfflineMedia Video',
        text: `Check out this ${v.platform} video!`,
        url: videoUrl
      };

      try {
        // Check if Web Share API is available
        if (navigator.share && navigator.canShare && navigator.canShare(shareData)) {
          await navigator.share(shareData);
        } else if (navigator.share) {
          // Try without canShare check
          await navigator.share(shareData);
        } else {
          // Fallback: copy link
          if (navigator.clipboard) {
            await navigator.clipboard.writeText(videoUrl);
            showToast('Link copied to clipboard!');
          } else {
            // Old fallback
            const input = document.createElement('input');
            input.value = videoUrl;
            document.body.appendChild(input);
            input.select();
            document.execCommand('copy');
            document.body.removeChild(input);
            showToast('Link copied!');
          }
        }
      } catch (e) {
        if (e.name !== 'AbortError') {
          console.error('Share failed:', e);
          showToast('Share failed. Try again.');
        }
      }
    }

    // ── Sidebar ──
    function pauseAllVideos() {
      allVideos.forEach((v, i) => {
        const vid = document.getElementById('vid-' + i);
        if (vid) {
          vid.pause();
          vid.muted = true;
        }
        playing[i] = false;
      });
    }
    function showLoading() { 
      pauseAllVideos();
      document.getElementById('loadingOverlay').classList.add('show'); 
    }
    function hideLoading() { document.getElementById('loadingOverlay').classList.remove('show'); }
    function toggleDropdown() { document.getElementById('profileDropdown').classList.toggle('open'); }
    document.addEventListener('click', e => { if (!e.target.closest('.profile-area')) document.getElementById('profileDropdown').classList.remove('open'); });
    function openSidebar() { document.getElementById('sidebar').classList.add('open'); document.getElementById('sidebarOverlay').classList.add('show'); }
    function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebarOverlay').classList.remove('show'); }
    function doLogout() { fetch('/logout').then(() => window.location.href = '/auth'); }
    function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2200); }

    // ── Init ──
    loadUser().then(loadVideos);

    // ── Keyboard Controls ──
    document.addEventListener('keydown', (e) => {
      if (e.target.id === 'commentInput') return;

      if (e.code === 'Space') {
        e.preventDefault();
        togglePlayPause(activeVideoIdx);
        return;
      }

      if (isTransitioning) return;

      if (e.key === 'ArrowDown' || e.key === 'PageDown') {
        e.preventDefault();
        goToSlide(activeVideoIdx + 1);
      } else if (e.key === 'ArrowUp' || e.key === 'PageUp') {
        e.preventDefault();
        goToSlide(activeVideoIdx - 1);
      }
    });

    // ── Mouse Wheel Control ──
    let lastWheelTime = 0;
    feedWrap.addEventListener('wheel', (e) => {
      if (isTransitioning) return;

      e.preventDefault();
      const now = Date.now();
      if (now - lastWheelTime < 600) return;

      lastWheelTime = now;
      if (e.deltaY > 30) {
        goToSlide(activeVideoIdx + 1);
      } else if (e.deltaY < -30) {
        goToSlide(activeVideoIdx - 1);
      }
    }, { passive: false });
  </script>

    </button>
    <button class="mobile-menu-item" onclick="openSettings()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v6m0 6v6M5.6 5.6l4.2 4.2m4.2 4.2l4.2 4.2M1 12h6m6 0h6M5.6 18.4l4.2-4.2m4.2-4.2l4.2-4.2"/></svg>
      Settings
    </button>
    <div class="mobile-menu-divider"></div>
    <button class="mobile-menu-item danger" onclick="window.location.href='/logout'">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4m7 14l5-5-5-5m5 5H9"/></svg>
      Logout
    </button>
  </div>

  <!-- Settings Modal -->
  <div class="overlay" id="settingsModal">
    <div class="modal" style="max-width: 480px;">
      <div class="modal-title">Profile Settings</div>
      <div class="form-group">
        <label>Name</label>
        <input type="text" id="set_name" placeholder="Your name">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="set_email" placeholder="your@email.com">
      </div>
      <div class="form-group">
        <label>Phone</label>
        <input type="tel" id="set_phone" placeholder="+1234567890">
      </div>
      <div class="form-group">
        <label>New Password (leave blank to keep current)</label>
        <input type="password" id="set_password" placeholder="••••••••">
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal('settingsModal')">Cancel</button>
        <button class="btn-submit" onclick="saveProfile()">Save Profile</button>
      </div>
    </div>
  </div>

  <script>
    function toggleMobileMenu() {
      const menu = document.getElementById('mobileProfileMenu');
      menu.classList.toggle('open');
    }

    function openSettings() {
      toggleMobileMenu();
      document.getElementById('settingsModal').classList.add('open');
      
      // Populate form
      document.getElementById('set_name').value = userData?.name || '';
      document.getElementById('set_email').value = userData?.email || '';
      document.getElementById('set_phone').value = userData?.phone || '';
      document.getElementById('set_password').value = '';
    }

    function closeModal(id) {
      document.getElementById(id).classList.remove('open');
    }

    async function saveProfile() {
      const name = document.getElementById('set_name').value;
      const email = document.getElementById('set_email').value;
      const phone = document.getElementById('set_phone').value;
      const password = document.getElementById('set_password').value;

      const data = { name, email, phone };
      if (password) data.password = password;

      try {
        const res = await fetch('/api/user', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
        if (res.ok) {
          userData = { ...userData, ...data };
          closeModal('settingsModal');
          alert('Profile updated!');
          await loadUser();
        } else {
          alert('Failed to update profile');
        }
      } catch (e) {
        alert('Error updating profile');
      }
    }

    document.addEventListener('click', (e) => {
      const menu = document.getElementById('mobileProfileMenu');
      const btn = e.target.closest('.bottom-nav-item');
      if (menu && !menu.contains(e.target) && !btn) {
        menu.classList.remove('open');
      }
    });

    // Update mobile avatar
    fetch('/api/user').then(r => r.json()).then(user => {
      const mobileAvatar = document.getElementById('mobileAvatar');
      if (mobileAvatar) {
        if (user.avatar) {
          mobileAvatar.innerHTML = `<img src="${user.avatar}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;
        } else if (user.name) {
          mobileAvatar.textContent = user.name.charAt(0).toUpperCase();
        }
      }
    });
  </script>
</body>

</html>
