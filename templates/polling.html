<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OfflineMedia – Live Logs</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='g' x1='0%' y1='0%' x2='100%' y2='100%'><stop offset='0%' style='stop-color:%23667eea'/><stop offset='100%' style='stop-color:%23764ba2'/></linearGradient></defs><rect width='100' height='100' rx='16' fill='url(%23g)'/><path d='M35 25 L75 50 L35 75 Z' fill='%23fff'/></svg>">
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --card: #1a1a24;
      --border: rgba(255, 255, 255, 0.07);
      --accent: #7c3aed;
      --accent2: #06b6d4;
      --text: #f0f0f8;
      --muted: #6b6b80;
      --nav-w: 240px;
      --header-h: 64px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      min-height: 100vh;
      display: flex;
    }

    .sidebar {
      width: var(--nav-w);
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0;
      left: 0;
      height: 100vh;
      z-index: 101;
      transition: transform .3s;
    }
    .logo-area {
      padding: 20px 20px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .logo-mark {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      position: relative;
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
    }
    .logo-icon::before {
      content: '';
      position: absolute;
      width: 0;
      height: 0;
      border-left: 10px solid #fff;
      border-top: 6px solid transparent;
      border-bottom: 6px solid transparent;
      margin-left: 2px;
    }
    .logo-text {
      font-size: 18px;
      font-weight: 800;
    }
    .logo-text span { color: var(--accent2); }
    .nav-links {
      flex: 1;
      padding: 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      overflow-y: auto;
    }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 12px;
      color: var(--muted);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all .25s;
    }
    .nav-item:hover {
      background: var(--card);
      color: var(--text);
    }
    .nav-item.active {
      background: linear-gradient(135deg, rgba(124, 58, 237, 0.2), rgba(6, 182, 212, 0.1));
      color: var(--text);
      border: 1px solid rgba(124, 58, 237, 0.3);
    }
    .nav-icon {
      font-size: 18px;
      width: 22px;
      text-align: center;
    }

    .main {
      margin-left: var(--nav-w);
      flex: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .main::before {
      content: '';
      position: relative;
      display: block;
      padding: 16px 20px 8px;
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      display: none;
    }

    .header {
      height: var(--header-h);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .header-title {
      font-size: 18px;
      font-weight: 700;
      flex: 1;
    }
    .menu-btn {
      display: none;
      background: none;
      border: none;
      color: var(--text);
      font-size: 22px;
      cursor: pointer;
    }
    .content {
      flex: 1;
      padding: 28px 24px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .logs-container {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      flex: 1;
      overflow-y: auto;
      color: #0f0;
      line-height: 1.6;
    }
    .sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      z-index: 99;
    }

    @media(max-width:768px) {
      .sidebar { transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); }
      .sidebar-overlay.show { display: block; }
      .main { margin-left: 0; }
      .header { display: none; }
      .menu-btn { display: none; }
      .content { padding: 16px; padding-top: 16px; overflow: hidden; }
      .logs-container { flex: 1; }
    }

    /* ── MOBILE BOTTOM NAV ── */
    .bottom-nav {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 8px 0 max(8px, env(safe-area-inset-bottom));
      height: calc(65px + env(safe-area-inset-bottom));
      z-index: 1000;
    }

    .bottom-nav-items {
      display: flex;
      justify-content: space-around;
      align-items: center;
      max-width: 600px;
      margin: 0 auto;
    }

    .bottom-nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 6px 12px;
      text-decoration: none;
      color: var(--muted);
      font-size: 11px;
      font-weight: 500;
      transition: color .2s;
      flex: 1;
      max-width: 80px;
      background: none;
      border: none;
      cursor: pointer;
    }

    .bottom-nav-item svg {
      width: 24px;
      height: 24px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .bottom-nav-item.active {
      color: #00ffcc;
    }

    .bottom-nav-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
      color: #fff;
    }

    .mobile-profile-menu {
      display: none;
      position: fixed;
      bottom: 70px;
      right: 10px;
      background: #1e1e2a;
      backdrop-filter: blur(10px);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
      min-width: 160px;
      z-index: 1001;
    }

    .mobile-profile-menu.open {
      display: block;
    }

    .mobile-menu-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      font-size: 14px;
      cursor: pointer;
      transition: background .2s;
      color: var(--text);
      text-decoration: none;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
    }

    .mobile-menu-item:hover {
      background: var(--surface);
    }

    .mobile-menu-item.danger {
      color: #f87171;
    }

    .mobile-menu-divider {
      height: 1px;
      background: var(--border);
    }

    @media (max-width: 768px) {
      .main::before {
        content: 'Live Logs';
        display: block;
      }

      .sidebar {
        transform: translateX(-100%);
      }

      .main {
        margin-left: 0;
        padding-bottom: calc(70px + env(safe-area-inset-bottom));
      }

      .content {
        padding-bottom: calc(70px + env(safe-area-inset-bottom));
      }

      .bottom-nav {
        display: block;
      }
    }

    /* Modal */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(6px);
      z-index: 300;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .overlay.open {
      display: flex;
    }

    .modal {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 32px;
      width: 100%;
      max-width: 440px;
      animation: modalIn .3s cubic-bezier(.34, 1.56, .64, 1);
    }

    @keyframes modalIn {
      from {
        opacity: 0;
        transform: scale(0.85) translateY(20px);
      }
      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    .modal-title {
      font-size: 20px;
      font-weight: 800;
      margin-bottom: 24px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: .5px;
    }

    input, select {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 13px 16px;
      color: var(--text);
      font-size: 15px;
      outline: none;
      transition: border-color .3s;
    }

    input:focus, select:focus {
      border-color: var(--accent);
    }

    .modal-actions {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }

    .btn-cancel {
      flex: 1;
      padding: 13px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-submit {
      flex: 2;
      padding: 13px;
      background: linear-gradient(135deg, var(--accent), #9333ea);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all .3s;
    }

    .btn-submit:hover {
      box-shadow: 0 6px 20px rgba(124, 58, 237, 0.4);
    }
  </style>
</head>
<body>
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
  <nav class="sidebar" id="sidebar">
    <div class="logo-area">
      <div class="logo-mark">
        <div class="logo-icon"></div>
        <div class="logo-text">Offline<span>Media</span></div>
      </div>
    </div>
    <div class="nav-links">
      <a class="nav-item" href="/dashboard"><span class="nav-icon"></span> Dashboard</a>
      <a class="nav-item" href="/scrapp"><span class="nav-icon"></span> My Scrapp</a>
      <a class="nav-item" href="/play"><span class="nav-icon"></span> Play</a>
      <a class="nav-item" href="/saved"><span class="nav-icon"></span>Saved</a>
      <a class="nav-item active" href="/polling"><span class="nav-icon"></span> Polling</a>
    </div>
  </nav>

  <div class="main">
    <header class="header">
      <button class="menu-btn" onclick="openSidebar()">☰</button>
      <span class="header-title">Live Logs</span>
    </header>
    <div class="content">
      <div class="logs-container" id="logs">No logs yet...</div>
    </div>
  </div>

  <script>
    let pollInterval;

    function openSidebar() { 
      document.getElementById('sidebar').classList.add('open'); 
      document.getElementById('sidebarOverlay').classList.add('show'); 
    }
    function closeSidebar() { 
      document.getElementById('sidebar').classList.remove('open'); 
      document.getElementById('sidebarOverlay').classList.remove('show'); 
    }

    async function fetchLogs() {
      try {
        const res = await fetch('/api/scrapes');
        const scrapes = await res.json();
        const active = scrapes.filter(s => ['scraping', 'downloading'].includes(s.status));
        
        if (active.length > 0) {
          const logRes = await fetch(`/api/scrape-logs/${active[0].id}`);
          const data = await logRes.json();
          const logsEl = document.getElementById('logs');
          if (data.logs) {
            logsEl.innerHTML = data.logs.replace(/\n/g, '<br>') || 'No logs yet...';
            logsEl.scrollTop = logsEl.scrollHeight;
          }
        } else {
          document.getElementById('logs').innerHTML = 'No active scraping session...';
        }
      } catch (e) {
        console.error('Logs error:', e);
      }
    }

    function startPolling() {
      fetchLogs();
      pollInterval = setInterval(fetchLogs, 2000);
    }

    startPolling();
  </script>

  <!-- Mobile Bottom Navigation -->
  <nav class="bottom-nav">
    <div class="bottom-nav-items">
      <a href="/dashboard" class="bottom-nav-item">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        <span>Dashboard</span>
      </a>
      <a href="/scrapp" class="bottom-nav-item">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
        <span>Scrap</span>
      </a>
      <a href="/play" class="bottom-nav-item">
        <svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        <span>Play</span>
      </a>
      <a href="/polling" class="bottom-nav-item active">
        <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        <span>Polling</span>
      </a>
      <button class="bottom-nav-item" onclick="toggleMobileMenu()">
        <div class="bottom-nav-avatar" id="mobileAvatar">?</div>
        <span>Profile</span>
      </button>
    </div>
  </nav>

  <div class="mobile-profile-menu" id="mobileProfileMenu">
    <button class="mobile-menu-item" onclick="openSettings()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v6m0 6v6M5.6 5.6l4.2 4.2m4.2 4.2l4.2 4.2M1 12h6m6 0h6M5.6 18.4l4.2-4.2m4.2-4.2l4.2-4.2"/></svg>
      Settings
    </button>
    <div class="mobile-menu-divider"></div>
    <button class="mobile-menu-item danger" onclick="window.location.href='/logout'">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4m7 14l5-5-5-5m5 5H9"/></svg>
      Logout
    </button>
  </div>

  <!-- Settings Modal -->
  <div class="overlay" id="settingsModal">
    <div class="modal" style="max-width: 480px;">
      <div class="modal-title">Profile Settings</div>
      <div class="form-group">
        <label>Name</label>
        <input type="text" id="set_name" placeholder="Your name">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="set_email" placeholder="your@email.com">
      </div>
      <div class="form-group">
        <label>Phone</label>
        <input type="tel" id="set_phone" placeholder="+1234567890">
      </div>
      <div class="form-group">
        <label>New Password (leave blank to keep current)</label>
        <input type="password" id="set_password" placeholder="••••••••">
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal('settingsModal')">Cancel</button>
        <button class="btn-submit" onclick="saveProfile()">Save Profile</button>
      </div>
    </div>
  </div>

  <script>
    let userData = {};

    function toggleMobileMenu() {
      const menu = document.getElementById('mobileProfileMenu');
      menu.classList.toggle('open');
    }

    function openSettings() {
      toggleMobileMenu();
      document.getElementById('settingsModal').classList.add('open');
      
      // Populate form
      document.getElementById('set_name').value = userData.name || '';
      document.getElementById('set_email').value = userData.email || '';
      document.getElementById('set_phone').value = userData.phone || '';
      document.getElementById('set_password').value = '';
    }

    function closeModal(id) {
      document.getElementById(id).classList.remove('open');
    }

    async function saveProfile() {
      const name = document.getElementById('set_name').value;
      const email = document.getElementById('set_email').value;
      const phone = document.getElementById('set_phone').value;
      const password = document.getElementById('set_password').value;

      const data = { name, email, phone };
      if (password) data.password = password;

      try {
        const res = await fetch('/api/user', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
        if (res.ok) {
          userData = { ...userData, ...data };
          closeModal('settingsModal');
          alert('Profile updated!');
          await initUser();
        } else {
          alert('Failed to update profile');
        }
      } catch (e) {
        alert('Error updating profile');
      }
    }

    document.addEventListener('click', (e) => {
      const menu = document.getElementById('mobileProfileMenu');
      const btn = e.target.closest('.bottom-nav-item');
      if (menu && !menu.contains(e.target) && !btn) {
        menu.classList.remove('open');
      }
    });

    // Load user data on page load
    async function initUser() {
      try {
        const user = await fetch('/api/user').then(r => r.json());
        userData = user;
        const mobileAvatar = document.getElementById('mobileAvatar');
        if (mobileAvatar) {
          if (user.avatar) {
            mobileAvatar.innerHTML = `<img src="${user.avatar}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;
          } else if (user.name) {
            mobileAvatar.textContent = user.name.charAt(0).toUpperCase();
          }
        }
      } catch (e) {
        console.error('Failed to load user:', e);
      }
    }
    
    initUser();
  </script>
</body>
</html>
