<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OfflineMedia – Sign In</title>
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='g' x1='0%' y1='0%' x2='100%' y2='100%'><stop offset='0%' style='stop-color:%23667eea'/><stop offset='100%' style='stop-color:%23764ba2'/></linearGradient></defs><rect width='100' height='100' rx='16' fill='url(%23g)'/><path d='M35 25 L75 50 L35 75 Z' fill='%23fff'/></svg>">
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --card: #1a1a24;
      --border: rgba(255, 255, 255, 0.07);
      --accent: #7c3aed;
      --accent2: #06b6d4;
      --text: #f0f0f8;
      --muted: #6b6b80;
      --error: #ef4444;
      --success: #22c55e;
      --radius: 16px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .bg-orbs {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.3;
    }

    .orb1 {
      width: 500px;
      height: 500px;
      background: var(--accent);
      top: -100px;
      right: -100px;
    }

    .orb2 {
      width: 400px;
      height: 400px;
      background: var(--accent2);
      bottom: -100px;
      left: -100px;
    }

    .orb3 {
      width: 300px;
      height: 300px;
      background: #ec4899;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    .auth-wrap {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 480px;
      margin: auto;
      padding: 24px 16px;
    }

    .logo-area {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo-mark {
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
    }

    .logo-icon::before {
      content: '';
      position: absolute;
      width: 0;
      height: 0;
      border-left: 14px solid #fff;
      border-top: 8px solid transparent;
      border-bottom: 8px solid transparent;
      margin-left: 2px;
    }

    .logo-text {
      font-family: inherit;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    .logo-text span {
      color: var(--accent2);
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 36px 32px;
      backdrop-filter: blur(20px);
    }

    .tabs {
      display: flex;
      background: var(--surface);
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 28px;
    }

    .tab {
      flex: 1;
      padding: 10px;
      border: none;
      background: none;
      color: var(--muted);
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      border-radius: 10px;
      cursor: pointer;
      transition: all .3s;
    }

    .tab.active {
      background: var(--accent);
      color: #fff;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 6px;
      letter-spacing: .5px;
      text-transform: uppercase;
    }

    input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 13px 16px;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      font-size: 15px;
      outline: none;
      transition: all .3s;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.15);
    }

    input::placeholder {
      color: var(--muted);
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap input {
      padding-right: 44px;
    }

    .eye-btn {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
    }

    .btn-primary {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, var(--accent), #9333ea);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-family: inherit;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all .3s;
      letter-spacing: .3px;
      margin-top: 8px;
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(124, 58, 237, 0.4);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .msg {
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 14px;
      margin-bottom: 16px;
      display: none;
    }

    .msg.error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #fca5a5;
    }

    .msg.success {
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.3);
      color: #86efac;
    }

    .msg.show {
      display: block;
    }

    .divider {
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      margin: 20px 0;
      position: relative;
    }

    .divider::before,
    .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 42%;
      height: 1px;
      background: var(--border);
    }

    .divider::before {
      left: 0;
    }

    .divider::after {
      right: 0;
    }

    @media(max-width:480px) {
      .card {
        padding: 28px 20px;
      }

      .form-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div class="bg-orbs">
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>
  </div>

  <div class="auth-wrap">
    <div class="logo-area">
      <div class="logo-mark">
        <div class="logo-icon"></div>
        <div class="logo-text">Offline<span>Media</span></div>
      </div>
    </div>

    <div class="card">
      <div class="tabs">
        <button class="tab active" onclick="switchTab('login')">Sign In</button>
        <button class="tab" onclick="switchTab('register')">Register</button>
      </div>

      <div id="msg" class="msg"></div>

      <!-- Login Form -->
      <div id="loginForm">
        <div class="form-group">
          <label>Username or Email</label>
          <input type="text" id="l_user" placeholder="Enter username or email">
        </div>
        <div class="form-group">
          <label>Password</label>
          <div class="input-wrap">
            <input type="password" id="l_pass" placeholder="Enter password">
            <button class="eye-btn" onclick="togglePwd('l_pass',this)">👁</button>
          </div>
        </div>
        <button class="btn-primary" onclick="doLogin()">Sign In →</button>
      </div>

      <!-- Register Form -->
      <div id="registerForm" style="display:none;">
        <div class="form-row">
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="r_name" placeholder="John Doe">
          </div>
          <div class="form-group">
            <label>Username</label>
            <input type="text" id="r_uname" placeholder="johndoe">
          </div>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="r_email" placeholder="john@example.com">
        </div>
        <div class="form-group">
          <label>Phone</label>
          <input type="tel" id="r_phone" placeholder="+91 9876543210">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Password</label>
            <div class="input-wrap">
              <input type="password" id="r_pass" placeholder="Min 6 chars">
              <button class="eye-btn" onclick="togglePwd('r_pass',this)">👁</button>
            </div>
          </div>
          <div class="form-group">
            <label>Confirm Password</label>
            <div class="input-wrap">
              <input type="password" id="r_cpass" placeholder="Repeat">
              <button class="eye-btn" onclick="togglePwd('r_cpass',this)">👁</button>
            </div>
          </div>
        </div>
        <button class="btn-primary" onclick="doRegister()">Create Account →</button>
      </div>
    </div>
  </div>

  <script>
    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === (tab === 'login' ? 0 : 1)));
      document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
      document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';
      showMsg('', '');
    }
    function showMsg(txt, type) {
      const el = document.getElementById('msg');
      el.textContent = txt; el.className = 'msg' + (txt ? ' show ' + type : '');
    }
    function togglePwd(id, btn) {
      const inp = document.getElementById(id);
      inp.type = inp.type === 'password' ? 'text' : 'password';
      btn.textContent = inp.type === 'password' ? '👁' : '🙈';
    }

    async function doRegister() {
      const name = document.getElementById('r_name').value.trim();
      const uname = document.getElementById('r_uname').value.trim();
      const email = document.getElementById('r_email').value.trim();
      const phone = document.getElementById('r_phone').value.trim();
      const pass = document.getElementById('r_pass').value;
      const cpass = document.getElementById('r_cpass').value;
      if (!name || !uname || !email || !pass || !cpass) return showMsg('All fields are required.', 'error');
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) return showMsg('Invalid email address.', 'error');
      if (pass.length < 6) return showMsg('Password must be at least 6 characters.', 'error');
      if (pass !== cpass) return showMsg('Passwords do not match.', 'error');

      try {
        const res = await fetch('/api/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: uname, email, name, password: pass })
        });
        const data = await res.json();
        if (data.success) {
          showMsg('Account created! You can now sign in.', 'success');
          setTimeout(() => switchTab('login'), 1500);
        } else {
          showMsg(data.message || 'Registration failed.', 'error');
        }
      } catch (e) {
        showMsg('Network error. Please try again.', 'error');
      }
    }

    async function doLogin() {
      const user = document.getElementById('l_user').value.trim();
      const pass = document.getElementById('l_pass').value;
      if (!user || !pass) return showMsg('Please enter credentials.', 'error');

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: user, password: pass })
        });
        const data = await res.json();
        if (data.success) {
          showMsg('Welcome back!', 'success');
          setTimeout(() => window.location.href = '/dashboard', 800);
        } else {
          showMsg(data.message || 'Invalid credentials.', 'error');
        }
      } catch (e) {
        showMsg('Network error. Please try again.', 'error');
      }
    }
  </script>
</body>

</html>
